name: Extract Project
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip and restructure
        run: |
          unzip tradepulse-phase1.zip
          cp -r tradepulse/. .
          rm -rf tradepulse
          rm -f tradepulse-phase1.zip
      - name: Commit files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Extract project files"
          git push
